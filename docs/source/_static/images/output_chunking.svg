<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <text x="380" y="25" text-anchor="middle" font-size="14" font-weight="bold">Why output overflow is expensive: chunking forces weight re-loads</text>

  <!-- ============ LEFT: output fits ============ -->
  <text x="190" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Output fits in LX</text>
  <text x="190" y="76" text-anchor="middle" font-size="10" fill="#475569">single K-loop, weights loaded once</text>

  <!-- LX box (fits case) -->
  <rect x="60" y="95" width="260" height="160" rx="6" fill="#fdfdfd" stroke="#475569" stroke-width="1.5"/>
  <text x="190" y="115" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">LX (2 MB)</text>
  <rect x="75" y="125" width="230" height="20" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="140" text-anchor="middle" font-size="10" fill="#2563eb">activation tile</text>
  <rect x="75" y="150" width="230" height="55" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="180" text-anchor="middle" font-size="10" fill="#92400e">weight tile</text>
  <rect x="75" y="210" width="230" height="35" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="190" y="232" text-anchor="middle" font-size="10" fill="#166534">output accumulator</text>

  <!-- Timeline below -->
  <text x="190" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">timeline:</text>
  <line x1="60" y1="305" x2="320" y2="305" stroke="#475569" stroke-width="1.5"/>
  <rect x="60" y="295" width="40" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="80" y="309" text-anchor="middle" font-size="9" fill="#92400e">load W</text>
  <rect x="100" y="295" width="200" height="20" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="200" y="309" text-anchor="middle" font-size="10" fill="#166534">K-loop (reuse W K times)</text>
  <rect x="300" y="295" width="20" height="20" fill="#e5e7eb" stroke="#475569" stroke-width="1"/>
  <text x="310" y="309" text-anchor="middle" font-size="9">→</text>

  <text x="190" y="350" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">✓ weights loaded ONCE</text>
  <text x="190" y="368" text-anchor="middle" font-size="10" fill="#475569">cost ≈ compute + (1 × weight HBM load)</text>

  <!-- divider line -->
  <line x1="380" y1="50" x2="380" y2="430" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ============ RIGHT: output overflows ============ -->
  <text x="570" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">Output overflows LX</text>
  <text x="570" y="76" text-anchor="middle" font-size="10" fill="#475569">must chunk output → re-load weights per chunk</text>

  <!-- LX box (overflows case) -->
  <rect x="440" y="95" width="260" height="160" rx="6" fill="#fdfdfd" stroke="#475569" stroke-width="1.5"/>
  <text x="570" y="115" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">LX (2 MB) — output too big!</text>
  <rect x="455" y="125" width="230" height="20" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="570" y="140" text-anchor="middle" font-size="10" fill="#2563eb">activation tile</text>
  <rect x="455" y="150" width="230" height="55" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="570" y="180" text-anchor="middle" font-size="10" fill="#92400e">weight tile (per chunk)</text>
  <rect x="455" y="210" width="230" height="35" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="570" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">output accumulator — chunked</text>

  <!-- Timeline below -->
  <text x="570" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">timeline (4-chunk example):</text>
  <line x1="440" y1="305" x2="700" y2="305" stroke="#475569" stroke-width="1.5"/>

  <!-- Chunk 1 -->
  <rect x="440" y="295" width="20" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="309" text-anchor="middle" font-size="7" fill="#92400e">load</text>
  <rect x="460" y="295" width="40" height="20" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="480" y="309" text-anchor="middle" font-size="8" fill="#b91c1c">K-loop</text>
  <!-- Chunk 2 -->
  <rect x="500" y="295" width="20" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="510" y="309" text-anchor="middle" font-size="7" fill="#92400e">load</text>
  <rect x="520" y="295" width="40" height="20" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="540" y="309" text-anchor="middle" font-size="8" fill="#b91c1c">K-loop</text>
  <!-- Chunk 3 -->
  <rect x="560" y="295" width="20" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="570" y="309" text-anchor="middle" font-size="7" fill="#92400e">load</text>
  <rect x="580" y="295" width="40" height="20" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="600" y="309" text-anchor="middle" font-size="8" fill="#b91c1c">K-loop</text>
  <!-- Chunk 4 -->
  <rect x="620" y="295" width="20" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="630" y="309" text-anchor="middle" font-size="7" fill="#92400e">load</text>
  <rect x="640" y="295" width="40" height="20" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="660" y="309" text-anchor="middle" font-size="8" fill="#b91c1c">K-loop</text>
  <rect x="680" y="295" width="20" height="20" fill="#e5e7eb" stroke="#475569" stroke-width="1"/>
  <text x="690" y="309" text-anchor="middle" font-size="9">→</text>

  <!-- annotation -->
  <text x="570" y="350" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="bold">✗ weights loaded N_chunks times!</text>
  <text x="570" y="368" text-anchor="middle" font-size="10" fill="#475569">cost ≈ compute + (N_chunks × weight HBM load)</text>
  <text x="570" y="384" text-anchor="middle" font-size="10" fill="#475569">extra: <tspan font-weight="bold">(N_chunks − 1) × per_core_weights / HBM_BW</tspan></text>

  <!-- Punchline box -->
  <rect x="60" y="410" width="640" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="380" y="427" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">measured slope: ≈ 0.75 ms / MB of per-core output</text>
  <text x="380" y="443" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">~80× more expensive per byte than per-core weight overflow alone</text>
</svg>
